name: Update Trade Data

on:
  schedule:
    # Run daily at 06:00 UTC (after overnight House/Senate disclosure updates)
    - cron: "0 6 * * *"
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pipeline dependencies
        run: |
          cd pipeline
          pip install -r requirements.txt

      - name: Run data pipeline
        env:
          CONGRESS_API_KEY:  ${{ secrets.CONGRESS_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          PIPELINE_YEARS_BACK: "5"
          PIPELINE_LOG_LEVEL: "INFO"
        run: |
          cd pipeline
          python main.py --step all

      - name: Commit updated artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/artifacts/
          git diff --staged --quiet || git commit -m "chore: update trade data [$(date -u '+%Y-%m-%d')]"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Vercel deployment
        if: success()
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          fi
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
